apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: regx-redis
  namespace: regx
spec:
  serviceName: regx-redis
  replicas: 1
  selector:
    matchLabels:
      app: regx-redis
  template:
    metadata:
      labels:
        app: regx-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - "900 1"
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: regx-backend-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "768Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: regx-redis
  namespace: regx
spec:
  selector:
    app: regx-redis
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
