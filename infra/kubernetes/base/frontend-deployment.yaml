apiVersion: apps/v1
kind: Deployment
metadata:
  name: regx-frontend
  namespace: regx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: regx-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: regx-frontend
    spec:
      containers:
        - name: frontend
          image: regx/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: regx-frontend
  namespace: regx
spec:
  selector:
    app: regx-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: regx-ingress
  namespace: regx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.regx.co
        - api.regx.co
      secretName: regx-tls
  rules:
    - host: api.regx.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: regx-backend
                port:
                  number: 3000
    - host: app.regx.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: regx-frontend
                port:
                  number: 80
