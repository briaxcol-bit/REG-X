apiVersion: apps/v1
kind: Deployment
metadata:
  name: regx-backend
  namespace: regx
  labels:
    app: regx-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: regx-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: regx-backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: regx-backend
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: regx/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: APP_PORT
              value: "3000"
          envFrom:
            - secretRef:
                name: regx-backend-secrets
            - configMapRef:
                name: regx-backend-config
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: regx-backend
---
apiVersion: v1
kind: Service
metadata:
  name: regx-backend
  namespace: regx
spec:
  selector:
    app: regx-backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: regx-backend
  namespace: regx
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: regx-backend-pdb
  namespace: regx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: regx-backend
