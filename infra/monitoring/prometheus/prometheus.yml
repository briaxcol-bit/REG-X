global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: regx-monitor
    environment: production

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── REG-X Backend ────────────────────────────────────────────
  - job_name: regx-backend
    static_configs:
      - targets: ["regx-backend:3000"]
    metrics_path: /api/metrics
    scrape_interval: 10s

  # ── Redis ─────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ── Node exporter ─────────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Kong ─────────────────────────────────────────────────────
  - job_name: kong
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  # ── OTel Collector ────────────────────────────────────────────
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
