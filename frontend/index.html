<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F20D18" />
    <meta name="description" content="REG-X ERP/POS SaaS Enterprise — Gestión completa de negocio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="REG-X" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Windows PWA -->
    <meta name="msapplication-TileColor" content="#F20D18" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="REG-X ERP/POS" />
    <meta property="og:description" content="Sistema ERP/POS SaaS Enterprise" />
    <meta property="og:image" content="/og-image.png" />
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- El manifest lo inyecta vite-plugin-pwa en build; en dev no existe y
         referenciarlo a mano causa "Manifest: Syntax error" en consola. -->
    <title>REG-X ERP/POS</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Anti-flash: aplica tema ANTES de que React monte -->
    <script>
      (function () {
        var stored = localStorage.getItem('regx-theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var theme = stored || (prefersDark ? 'dark' : 'light')
        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
